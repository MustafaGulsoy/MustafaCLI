services:
  # ── Core Services ───────────────────────────────────────────────

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mustafacli-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mustafacli
      POSTGRES_USER: mustafa
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mustafa -d mustafacli"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama service (local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: mustafacli-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MustafaCLI Agent API
  agent:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: mustafacli-agent
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - AGENT_MODEL_NAME=qwen2.5-coder:32b
      - AGENT_WORKING_DIR=/workspace
      - AGENT_LOG_LEVEL=INFO
      - AGENT_ENABLE_METRICS=true
      - AGENT_ALLOW_DANGEROUS_COMMANDS=false
      - AGENT_DATABASE_URL=postgresql+asyncpg://mustafa:password@postgres:5432/mustafacli
      - AGENT_JWT_SECRET=change-me-in-production-please
      - PROVIDER_TYPE=ollama
      - PROVIDER_OLLAMA_URL=http://ollama:11434
      # SAT-MAESTRO env vars (only used if plugin is enabled)
      - SAT_MAESTRO_NEO4J_URI=bolt://neo4j:7687
      - SAT_MAESTRO_NEO4J_USER=neo4j
      - SAT_MAESTRO_NEO4J_PASSWORD=satmaestro
      - SAT_MAESTRO_OLLAMA_URL=http://ollama:11434
      - SAT_MAESTRO_VISION_MODEL=llava:13b
    volumes:
      - workspace:/workspace
      - logs:/var/log/mustafacli
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Monitoring ──────────────────────────────────────────────────

  # Prometheus (metrics collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: mustafacli-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana (metrics visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: mustafacli-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  # ── SAT-MAESTRO Plugin Services ────────────────────────────────

  # Neo4j Knowledge Graph (SAT-MAESTRO)
  neo4j:
    image: neo4j:5-community
    container_name: mustafacli-neo4j
    profiles: ["sat-maestro"]
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/satmaestro
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p satmaestro 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  ollama-data:
  workspace:
  logs:
  prometheus-data:
  grafana-data:
  neo4j-data:
  neo4j-logs:
